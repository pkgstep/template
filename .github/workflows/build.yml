name: Build Chromium

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            name: amd64
          - runner: ubuntu-24.04-arm
            name: arm64
    runs-on: ${{ matrix.runner }}
    container: debian:12
    name: Build ${{ github.event.repository.name }} (${{ matrix.name }})
    steps:
      - name: Install prerequisites
        run: |
          set -e
          apt-get update
          apt-get install -y sudo git ca-certificates wget squashfs-tools

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Bootstrap Gershwin developer environment
        run: |
          set -e
          git clone https://github.com/gershwin-desktop/gershwin-developer.git /Developer
          /Developer/Library/Scripts/Bootstrap.sh
          /Developer/Library/Scripts/Checkout.sh
          cd /Developer && make install

      - name: Build and package Chromium
        shell: bash
        run: |
          set -e
          . /System/Library/Makefiles/GNUstep.sh
          cd "$GITHUB_WORKSPACE"
          pkgwrap "${{ github.event.repository.name }}"

      - name: Upload .squashfs to continuous release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          shopt -s nullglob
          pkgs=( "$HOME"/*.squashfs )
          if [ ${#pkgs[@]} -eq 0 ]; then
            echo "No .squashfs file found in $HOME" >&2
            exit 1
          fi
          ls -lh "${pkgs[@]}"
          wget -c https://github.com/probonopd/uploadtool/raw/master/upload.sh
          bash upload.sh "${pkgs[@]}"
